<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Delicia</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>
    <header>
        <nav class="menu">
            <div class="menu-logo">
                <i class="bi bi-cup-hot"></i>
                <p class="texto-logo"> Café Delicia</p>
            </div>
            <ul class="lista-menu">
                <li>
                    <a href="#">Inicio</a>
                </li>
                <li>
                    <a href="#">Produtos</a>
                </li>
                <li>
                    <a href="#">Sobre Nós</a>
                </li>
                <li>
                    <a href="#">Contatos</a>
                </li>
            </ul>
            <div class="menu-icones">
                <i class="bi bi-cart2"></i>
                <i class="bi bi-list"></i>
            </div>
        </nav>
    </header>
    <main>
        <section class="section-center">
            <div class="banner">
                <div class="elementos-banner">

                </div>
                <div class="caixa-titulo-banner">
                    <p class="titulo-banner">
                        Bem-vindo ao Café Delicia
                    </p>
                    <p class="texto-banner">
                        O melhor café artesanal e doces frescos todos os dias.
                    </p>
                    <button class="btn-banner-menu">Ver Menu</button>
                </div>
            </div>
        </section>
        <section class="section-mid">
            <div class="caixa-texto-produtos">
                <div class="titulo-produtos"> Nossos Proutos</div>
                <div class="texto-produtos">
                    Descubra nossa seleção de cafés artesanais, doces frescos e pratos deliciosos preparados com os
                    melhores ingredientes.</div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
</body>

</html>
